<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/login.css">
    <title>Login Page</title>
</head>
<body>
    <div class="wrapper">
        <div class="left-container">
            <div class="title-container">
                <div class="logo"><img src="./src/Group 2.png" alt=""></div>
                <div class="title-text">
                    <img class="main-text" src="./src/Colegio de San Pascual Baylon.png" alt="">
                    <img class="sub-text" src="./src/Pag-asa, Obando, Bulacan.png" alt="">
                </div>
            </div>
        </div>
        <div class="right-container">
            <form action="" class="form">
                <h2 class="welcome">Welcome</h2>
                <div class="input-card">
                        <div class="input-container">
                        <label for="username">Username:</label>
                        <input type="text" name="username" id="username" required placeholder="username">
                    </div>
                    <div class="input-container">
                        <label for="password">password:</label>
                        <input type="password" id="password" name="password" placeholder="password">
                    </div>
                    <div class="password-container">
                        <a href="#">forgot password?</a>
                    </div>
                    <button class="submitBtn" type="submit">Log in</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
